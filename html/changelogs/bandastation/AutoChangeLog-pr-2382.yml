author: "tgstation"
delete-after: True
changes:
  - qol: "Для многих компонентов схем порты, которые используются как булевы входы или выходы, были преобразованы в новый булев тип данных."
  - bugfix: "Исправлена ошибка с упаковкой посылок."
  - rscadd: "Нечеловеческие мобы с руками теперь могут поднимать других мобов, которые меньше их и обычно могут быть подняты."
  - bugfix: "Пить суп теперь будет повторяться, пока он не закончится или вы не отмените действие (как раньше)."
  - bugfix: "Скелет, получивший удар током, теперь соответствует вашему росту."
  - bugfix: "Товары грузового отдела теперь отображаются на консоли заказов и запросов."
  - bugfix: "Исправлен вывод информации о состоянии здоровья, игнорировавший питание от АПЦ, когда его прикрепляли к стене."
  - rscadd: "Некоторые нижние предметы гардероба теперь автоматически заменяются на универсальные аналоги, подходящие для тел ящеров."
  - refactor: "Код генерации иконок для нижней одежды был переработан, сообщите о любых ошибках в этом процессе."
  - code_imp: "Код RTG был очищен. Теперь администраторам легче управлять ими через VV. Если вы заметите странное поведение руин с использованием RTG на Lavaland или в космосе, сообщите об этом как о проблеме."
  - bugfix: "Очки из торгового автомата теперь учитываются при выполнении задания виртуального домена Beach Bar."
  - bugfix: "Дружелюбные огоньки, гравитационные шары волшебника и периферийные шары Тесла больше не отключаются во время перемещения шаттла."
  - qol: "Сканер штрих-кодов хранителя знаний теперь позволяет регистрировать книги."
  - bugfix: "В консоли библиотеки больше нельзя брать книги на бесконечное время."
  - rscadd: "Дисплей жизненных показателей теперь можно печатать на древних станках."
  - code_imp: "Вместо магических чисел теперь используются определенные значения в carbon_stripping.dm."
  - bugfix: "Функция затемнения тряски экрана больше не влияет на экран под полноэкранным оверлеем."
  - bugfix: "В клоунскую машину теперь можно положить горн."
  - map: "Фейковая палочка исцеления в снежной хижине теперь сохраняет свою иконку."
  - bugfix: "Скотч снова может фиксировать протезные конечности."
  - code_imp: "Пакеты поставок теперь можно создавать с использованием контейнеров, отличных от ящиков."
  - bugfix: "Событие случайной поставки теперь правильно спавнит предметы вместо сбоя."
  - qol: "Сообщения связи слизней теперь уведомляют слушателей с помощью визуального всплывающего окна."
  - bugfix: "Если порвать постер при его размещении, на стене появится только разорванный постер, а новый в руку не добавится."
  - spellcheck: "Иммобильные мобильные дефибрилляторные установки больше не называются мобильными."
  - bugfix: "Место пристыковки шаттла медсимуляции теперь правильно совпадает с большинством эвакуационных терминалов."
  - bugfix: "Исправлена ошибка, из-за которой использование заклинаний после удаления моба могло привести к его постоянной ошибочной работе."
  - rscadd: "Добавлены три новых ликера, бутылки доступны в booze-o-mat."
  - rscadd: "Добавлено 15 новых коктейлей, использующих упомянутые ликеры."
  - bugfix: "Галлюцинация себя в виде другого моба больше не отключает все ваши источники света."
  - qol: "Отчет анализатора здоровья, связанных с легкими, теперь выводится в разделе легочных органов, а не внизу списка."
  - code_imp: "Добавлены недостающие битфлаги в определения битовых полей."
  - rscadd: "Centcom теперь предлагает приобрести пластиковые заслонки, блокирующие воздушный поток, а также возможность заправить грузовой шаттл воздухом за относительно низкую цену — 8,000 кредитов. Узнайте больше в категории \"Импорт\"!"
  - bugfix: "Исправлено несколько проблем, связанных с операцией установки имплантов в руки."
  - refactor: "Случайные рецепты, такие как metalgen и секретный соус, были переработаны. Сообщите о возможных ошибках на GitHub."
  - bugfix: "Невозможно установить бесконечное количество водоочистителей в раму раковины."
  - bugfix: "Рамы раковины теперь можно прикреплять к стенам в большинстве случаев, независимо от того, что находится на стене (за исключением случаев, когда там уже есть осветительный прибор, камера или другая раковина)."
  - qol: "Элемент панели характеристик генокрадов перемещен в HUD и панель антагонистов. Также добавлены дополнительные объяснения работы генокрадов."
  - qol: "Элемент панели характеристик космического скафандра заменен на элемент HUD. Теперь вы можете навести мышку, чтобы увидеть точный процент заряда ячейки, а также кликнуть для включения регулятора или увидеть его состояние, когда он выключен."
  - bugfix: "Можно удалять вмятия во время операции."
  - bugfix: "Оторванные головы выглядят как обычные, несмотря на то, что в них есть мозг."
  - rscdel: "\"Лаборатория клонирования\" больше не является кодовым словом предателя."
  - bugfix: "Исправлена проблема, из-за которой станционная функция \"медленный шаттл\" иногда применялась некорректно."
  - bugfix: "Нельзя создать бесконечное количество плазостали с помощью балок."
  - spellcheck: "Изменены пробелы и пунктуация в сообщении предложения thanatorenasia для призраков."
  - admin: "При вынужденном землетрясении администраторы теперь могут выбирать точное место на станции."
  - qol: "Установка электроники в стеклянные двери/внутренние двери теперь перемещает электронику из руки только в случае успешной установки."
  - image: "Переработаны иконки коробки с наггетсами, добавлены 3 новых контейнера, связанных с едой: новая коробка для наггетсов, ведерко для крылышек и упаковка для картошки фри."
  - bugfix: "Оболочки интегральных схем теперь взрываются только в случае потребления слишком большого количества энергии за одну минуту, а не за весь срок службы, в ответ на жалобы одного пользователя. Представители Нанотрейзен заявляют, что это никак не связано с пропавшими партиями взрывчатых сплавов."
  - bugfix: "Исправлено, что предметы в стеке не возвращались при неудачных ритуалах вызова еретиков."
  - bugfix: "Исправлена ошибка параллакса, которая приводила к сбою, когда параллакс SS не выбирал случайный слой для отображения."
  - rscadd: "Возвращена академия, теперь это миссия с поиском."